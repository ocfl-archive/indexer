[XML]
Enabled=true
[XML.Format.FineReader10]
Element = "document"
Attributes.xmlns = "http://www.abbyy.com/FineReader_xml/FineReader10-schema-v1.xml"
Type = "ocr"
Subtype = "FineReader10"
Mime = "application/xml"
[XML.Format.CSLXML]
Element = "style"
Attributes.xmlns = "http://purl.org/net/xbiblio/csl"
Type = "bibliography"
Subtype = "cslxml"
Mime = "application/vnd.citationstyles.style+xml"
[XML.Format.mets]
Element = "mets:mets"
Regexp = true
Attributes."xmlns:mets" = "^https?://www.loc.gov/METS/?$"
Type = "metadata"
Subtype = "METS"
Mime = "application/xml"
[XML.Format.mei]
Element = "mei"
Attributes.xmlns = "http://www.music-encoding.org/ns/mei"
Type = "audio"
Subtype = "mei"
Mime = "application/xml"


[Siegfried]
Enabled=true
#Signature = "/usr/share/siegfried/default.sig"
#Signature = "file://C:/Users/micro/siegfried/default.sig"
Signature = "internal"

# mapping of pronom id to types
[Siegfried.TypeMap."fmt/483"]
Type = "text"
Subtype = "epub"
[Siegfried.TypeMap."fmt/158"]
Type = "text"
Subtype = "pdf"
[Siegfried.TypeMap."fmt/1840"]
Type = "archive"
Subtype = "wacz"

# mapping of pronom id to mimetype if not found in siegfried
[Siegfried.MimeMap]
"fmt/1840" = "application/x-wacz"
"x-fmt/92" = "image/psd"
"fmt/134" = "audio/mp3"
"x-fmt/184" = "image/x-sun-raster"
"fmt/202" = "image/x-nikon-nef"
"fmt/211" = "image/x-photo-cd"
"x-fmt/383" = "image/fits"
"fmt/405" = "image/x-portable-anymap"
"fmt/406" = "image/x-portable-graymap"
"fmt/408" = "image/x-portable-pixmap"
"fmt/436" = "image/x-adobe-dng"
"fmt/437" = "image/x-adobe-dng"
"fmt/592" = "image/x-canon-cr2"
"fmt/642" = "image/x-raw-fuji"
"fmt/662" = "image/x-raw-panasonic"
"fmt/668" = "image/x-olympus-orf"
"fmt/986" = "text/xmp"
"fmt/1001" = "image/x-exr"
"fmt/1040" = "image/vnd.ms-dds"
"fmt/1781" = "image/x-pentax-pef"

# relevance of mimetype for sorting
# relevance < 100: rate down
# relevance > 100: rate up
# default = 100
[MimeRelevance.1]
Regexp = "^application/octet-stream"
Weight = 1
[MimeRelevance.2]
Regexp = "^text/plain"
Weight = 3
[MimeRelevance.3]
Regexp = "^audio/mpeg"
Weight = 6
[MimeRelevance.4]
Regexp = "^video/mpeg"
Weight = 5
[MimeRelevance.5]
Regexp = "^application/vnd\\..+"
Weight = 4
[MimeRelevance.6]
Regexp = "^application/rtf"
Weight = 4
[MimeRelevance.7]
Regexp = "^application/.+"
Weight = 2
[MimeRelevance.8]
Regexp = "^text/.+"
Weight = 4
[MimeRelevance.9]
Regexp = "^audio/.+"
Weight = 5
[MimeRelevance.10]
Regexp = "^video/.+"
Weight = 4
[MimeRelevance.11]
Regexp = "^.+/x-.+"
Weight = 80

[FFMPEG]
ffprobe = ""
wsl = false  # true, if executable is within linux subsystem on windows
timeout = "25s"
online = true
enabled = true
[[FFMPEG.Mime]]
video = false
audio = true
format = "mov,mp4,m4a,3gp,3g2,mj2"
mime = "audio/mp4"
[[FFMPEG.Mime]]
video = true
audio = true
format = "mov,mp4,m4a,3gp,3g2,mj2"
mime = "video/mp4"
[[FFMPEG.Mime]]
video = true
audio = false
format = "mov,mp4,m4a,3gp,3g2,mj2"
mime = "video/mp4"

[ImageMagick]
identify = ""
convert = ""
wsl = false  # true, if executable is within linux subsystem on windows
timeout = "480s"
online = true
enabled = true

[Tika]
addressMeta = ""
#addressFulltext = "http://localhost:9998/tika"
#address = "http://localhost:9998/rmeta/text"
timeout = "10s"
regexpMimeFulltext = "^application/(pdf|vnd\\.oasis.opendocument.+|vnd\\.openxmlformats.+|vnd\\.ms-.+)" # "^.*$" # ""^application/.*$"  # regexp for mimetype, which are used for tika queries
regexpMimeFulltextNot = "" # "^.*$" # ""^application/.*$"
regexpMimeMeta = ""
regexpMimeMetaNot = "^(image|video|audio)/.*$"
online = true
enabled = true
